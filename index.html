/* =========================
   MOBILE (<= 600px) — simple version
   (no variables, no calc, no clamp)
   ========================= */
@media (max-width: 600px) {

  /* Make the page exactly one screen tall and stop scrolling */
  html, body {
    height: 100svh;
    overflow: hidden;
  }

  /* Screen background image on mobile (optional) */
  .bg-image {
    content: url('./landing_background_mobile2.png');
    width: 100%;
    height: 100svh;
    object-fit: cover;
    display: block;
  }

  /* Hide desktop-only elements on mobile */
  .scroll-container,
  .corner-icons-desktop,
  .desktop-logo-overlay,
  .hotspot-links {
    display: none !important;
  }

  .wrapper {
    position: relative;
    min-height: 100svh;
  }

  /* -------------------------
     TOP BAR
     - Two rows: Logo (row 1) + Links (row 2)
     - Fixed height so it’s easy to think about
     ------------------------- */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;

    /* make this taller/shorter if you ever want */
    height: 110px;

    padding: 28px 12px;
    margin: 0;
    background: #6dbbd1;
    display: flex;
    flex-direction: column;   /* logo row then links row */
    justify-content: center;  /* center both rows vertically */
    gap: 6px;
    width: 100% !important;
    z-index: 20;
  }

  /* Bigger logo inside the bar */
  .top-bar img {
    height: 90px !important;  /* adjust if you want it larger/smaller */
    width: auto;
    flex: 0 0 auto;
    padding-top: 30px;
  }

  /* Links row: stays inside, can wrap to the next line */
  .nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 10px;
    max-width: 100%;
    padding-bottom: 50px;
    
  }
  .nav-links a {
    font-size: 25px !important;  /* bigger links; change to 18px if too large on very small phones */
    line-height: 1.65;
    text-decoration: underline;
    font-weight: 800 !important;
    white-space: nowrap;
  }

  /* -------------------------
     MOBILE SLIDER (the image area)
     - Starts right under the top bar
     - Fixed height so it’s easy to control
     ------------------------- */
  .mobile-slider {
    position: absolute;
    top: 150px;          /* must match .top-bar height above */
    left: 50%;
    transform: translateX(-50%);
    width: 92vw;
    bottom: 128px;

    /* how tall the image area is; lower this to make it “shorter” */
    
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    border-radius: 10px; /* rounded corners all around */
    z-index: 9000;
  }

  .mobile-slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* -------------------------
     MOBILE LOGO OVERLAY (letters over the image)
     - Centered around the middle of the screen area
     ------------------------- */
  .mobile-logo-overlay {
    display: flex !important;
    position: absolute;

    /* place roughly in the middle of the visible area */
    top: 51%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 70vw;         /* keep proportions similar to before */
    max-width: 420px;
    height: auto;
    z-index: 9999;
    pointer-events: none;
  }
  .mobile-logo-overlay img {
    max-width: 100%;
    height: auto;
  }

  

  /* -------------------------
     ADDRESS (angled) above bottom icons
     ------------------------- */
  .desktop-angled-text { display: none !important; }

  .mobile-angled-text {
    display: block;
    position: absolute;

    /* keep it just above the bottom icons */
    bottom: 90px;        /* if icons change size, tweak this */
    right: 12px;

    font-size: 16px;
    font-weight: 800;
    color: black;
    transform: rotate(-9deg);
    z-index: 10;
    text-decoration: none;
    transition: transform .3s ease;

    height: 36px;        /* simple fixed “band” for the text */
    line-height: 36px;
  }
  .mobile-angled-text:hover { transform: rotate(-9deg) scale(1.03); }

  /* -------------------------
     BOTTOM ICONS (call / instagram / email)
     ------------------------- */
  .corner-icons-mobile {
   position: absolute;
  left: 0;
  right: 0;
  bottom: 20px;   /* same spacing everywhere */
  display: flex;
  justify-content: center;
  gap: 22px;      /* distance between icons */
  flex-direction: row;
  z-index: 11;
  }

  .corner-icons-mobile a {
    width: 64px;           /* icon button size */

    border-radius: 20%;

    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    flex: 0 0 auto;

  .corner-icons-mobile svg {
    width: 40px;           /* icon glyph size inside the button */
    height: 40px;
    fill: #6dbbd1;
    pointer-events: none;
  }
}
